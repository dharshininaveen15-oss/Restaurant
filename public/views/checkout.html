<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | QuickServe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

    <header class="bg-white px-6 py-6 border-b border-gray-100 flex items-center gap-4">
        <button onclick="window.location.href='/menu'" class="p-2 hover:bg-gray-100 rounded-full transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-xl font-extrabold text-gray-900">Your Order Details</h1>
    </header>

    <main class="max-w-3xl mx-auto px-6 mt-8">
        <div id="order-items" class="space-y-4 mb-8"></div>

        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-gray-100">
            <h2 class="text-lg font-black text-gray-900 mb-6">Bill Summary</h2>
            <div class="space-y-4 border-b border-gray-50 pb-6 mb-6">
                <div class="flex justify-between text-gray-500 font-medium">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="flex justify-between text-gray-500 font-medium">
                    <span>Service Tax (5%)</span>
                    <span id="tax">$0.00</span>
                </div>
            </div>
            <div class="flex justify-between items-center mb-8">
                <span class="text-xl font-black text-gray-900">Total Amount</span>
                <span id="total" class="text-2xl font-black text-orange-600">$0.00</span>
            </div>

            <button onclick="placeOrder()" id="order-btn" class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black text-lg hover:bg-orange-600 transition-all transform active:scale-95">
                Place Order Now
            </button>
        </div>
    </main>

    <div id="qr-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-[3rem] p-8 w-full max-w-sm text-center shadow-2xl transform transition-all">
            <div class="mb-6">
                <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                </div>
                <h3 class="text-2xl font-black text-gray-900">Scan to Pay</h3>
                <p class="text-gray-500 text-sm font-medium mt-2">Please pay to confirm your order.</p>
            </div>

            <div class="bg-gray-50 p-6 rounded-[2rem] mb-6 border-2 border-dashed border-gray-200">
                <img id="qr-image" src="" alt="Payment QR" class="mx-auto w-52 h-52">
                <p id="qr-total" class="mt-4 text-lg font-black text-orange-600">$0.00</p>
            </div>

            <button onclick="window.location.href='/menu'" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-orange-600 transition-all">
                Done & Return to Menu
            </button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const itemsContainer = document.getElementById('order-items');

        function renderCheckout() {
            if (cart.length === 0) {
                itemsContainer.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold">Your cart is empty!</div>`;
                document.getElementById('order-btn').disabled = true;
                return;
            }

            let subtotal = 0;
            itemsContainer.innerHTML = cart.map(item => {
                subtotal += item.price * item.quantity;
                return `
                    <div class="bg-white p-6 rounded-3xl flex justify-between items-center border border-gray-50">
                        <div>
                            <h4 class="font-bold text-gray-900">${item.name}</h4>
                            <p class="text-sm text-gray-400 font-medium">Quantity: ${item.quantity}</p>
                        </div>
                        <span class="font-black text-gray-900">$${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `;
            }).join('');

            const tax = subtotal * 0.05;
            const total = subtotal + tax;

            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;
        }

        async function placeOrder() {
            const orderBtn = document.getElementById('order-btn');
            const totalText = document.getElementById('total').innerText;
            const amountOnly = totalText.replace('$', ''); // Removes "$" for the payment link
            const tableNum = localStorage.getItem('tableNumber') || 'Guest';
            
            orderBtn.innerText = "Processing...";
            orderBtn.disabled = true;

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cart,
                        total: totalText,
                        tableNumber: tableNum,
                        timestamp: new Date()
                    })
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('qr-total').innerText = `Total: ${totalText}`;
                    
                    // --- UPI PAYMENT QR CONFIGURATION ---
                    const upiId = "yourname@okaxis"; // REPLACE WITH YOUR UPI ID
                    const name = "QuickServe";
                    // UPI Link format: upi://pay?pa=ID&pn=NAME&am=AMOUNT&cu=CURRENCY
                    const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amountOnly}&cu=INR`;
                    
                    // Update QR Image (Size increased to 250 for better scanning)
                    document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;

                    document.getElementById('qr-modal').classList.remove('hidden');
                    document.getElementById('qr-modal').classList.add('flex');
                    
                    localStorage.removeItem('cart');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Something went wrong. Please try again.');
                orderBtn.innerText = "Place Order Now";
                orderBtn.disabled = false;
            }
        }

        renderCheckout();
    </script>
</body>
</html>
