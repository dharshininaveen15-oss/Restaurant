<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | QuickServe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-100 px-6 py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='/menu'" class="cursor-pointer text-2xl font-extrabold text-gray-900 tracking-tight hover:text-orange-600 transition-colors">
                QuickServe
            </h1>
            <nav class="hidden md:flex gap-8 font-bold text-sm text-gray-600">
                <a href="/menu" class="hover:text-orange-600">Menu</a>
                <a href="/contact" class="text-orange-600">Join Us</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-16 text-center">
        <span class="text-orange-600 font-black uppercase tracking-[0.3em] text-xs">Careers & Partnerships</span>
        <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mt-4 mb-6">Join the QuickServe Family</h2>
        <p class="text-gray-500 text-lg mb-12 max-w-2xl mx-auto">Whether you're a chef, a delivery partner, or a restaurant owner looking to modernize, we'd love to hear from you.</p>

        <form class="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-gray-100 text-left space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Email Address</label>
                    <input type="email" placeholder="john@example.com" class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-900 mb-2">How can we work together?</label>
                <select class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 outline-none appearance-none">
                    <option>Join as a Restaurant Partner</option>
                    <option>Careers (Chef/Server)</option>
                    <option>Technical Support</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-900 mb-2">Message</label>
                <textarea rows="4" placeholder="Tell us a bit about yourself..." class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
            </div>
            <button type="submit" class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black text-lg hover:bg-orange-600 transition-all transform active:scale-95">
                Send Application
            </button>
        </form>
    </main>

    <footer class="bg-white border-t border-gray-100 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
            <div>
                <h3 class="text-xl font-black text-gray-900">QuickServe</h3>
                <p class="text-gray-400 text-sm mt-2">Next-gen QR ordering system.</p>
            </div>
            <div class="flex gap-8 text-sm font-bold text-gray-500">
                <a href="/menu" class="hover:text-orange-600">Browse Menu</a>
                <a href="/contact" class="hover:text-orange-600">Careers</a>
                <a href="#" class="hover:text-orange-600">Privacy</a>
            </div>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">© 2026 QuickServe Labs</p>
        </div>
    </footer>

</body>
</html>
